<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A static four-stem rehearsal player for synchronized band practice."
    />
    <link rel="icon" href="/favicon.svg" />
    <script>
      (() => {
        try {
          if (localStorage.getItem('4stem-player:theme') === 'dark') {
            document.documentElement.dataset.theme = 'dark';
          }
        } catch {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div>%sveltekit.body%</div>
  </body>
</html>
